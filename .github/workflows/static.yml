# Publiceert de site naar GitHub Pages + zelfcontrole -> health.json (dashboard in beheer)
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'health-status.json'   # voorkomt herhaling door de auto-commit
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'   # dagelijkse zelfcontrole — 04:00 NL (zomertijd) / 03:00 NL (wintertijd); cron is UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Zelfcontroles (schrijven health.json; blokkeren de publicatie niet) ---
      - name: Zelfcontrole (repo-inhoud)
        run: python3 selfcheck.py
        continue-on-error: true
      - name: Mutatie-zelftest (alle beheer-acties)
        run: |
          npm install jsdom --no-save --silent
          node mutatietest.js
        continue-on-error: true
      - name: Zelfcontrole (live site)
        run: python3 selfcheck.py --live
        continue-on-error: true

      # --- Health-status (incl. live scriptversie) vastleggen in de repo ---
      - name: Health-status opslaan (live scriptversie)
        run: |
          python3 health-status.py || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add health-status.json
          git commit -m "health-status.json automatisch bijgewerkt" || echo "geen wijziging"
          git push || echo "push overgeslagen"
        continue-on-error: true

      # --- Publiceren met automatische herhaling (health.json gaat mee) ---
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages (poging 1)
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Even wachten
        if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (poging 2)
        id: deploy2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Nog even wachten
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (poging 3)
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
