# Publiceert de statische site naar GitHub Pages + zelfcontrole (repo + live)
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # dagelijkse zelfcontrole (± 07:00 NL)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Zelfcontrole van de repo-inhoud (vóór publiceren) ---
      - name: Zelfcontrole (repo-inhoud)
        run: python3 selfcheck.py

      # --- Publiceren met automatische herhaling ---
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages (poging 1)
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Even wachten
        if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (poging 2)
        id: deploy2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Nog even wachten
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (poging 3)
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      # --- Zelfcontrole van de gepubliceerde site (na publiceren) ---
      - name: Even wachten op verwerking
        run: sleep 20
      - name: Zelfcontrole (live site)
        run: python3 selfcheck.py --live
